<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7cc6ff"/>
      <stop offset="1" stop-color="#2a78d8"/>
    </linearGradient>
    <linearGradient id="fin" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#3a8ce8"/>
      <stop offset="1" stop-color="#16489e"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0b1f33"/>
  <g stroke="#0a2b63" stroke-width="0.8" stroke-linejoin="round">
    <!-- caudal (tail) fin, flowing to the left -->
    <path d="M14 16 L4 9 Q1 16 4 23 Z" fill="url(#fin)"/>
    <!-- dorsal (top) fin -->
    <path d="M19 11 Q16 4 25 8 Q23 12 21 11 Z" fill="url(#fin)"/>
    <!-- anal (bottom) fin -->
    <path d="M19 21 Q16 28 25 24 Q23 20 21 21 Z" fill="url(#fin)"/>
    <!-- body -->
    <ellipse cx="19.5" cy="16" rx="7" ry="5.4" fill="url(#body)"/>
  </g>
  <!-- pectoral fin -->
  <path d="M18 17 Q16 20 19 21 Q20 19 19 17 Z" fill="#bfe0ff" opacity="0.85"/>
  <!-- belly highlight -->
  <ellipse cx="18.5" cy="13.5" rx="2.4" ry="1.3" fill="#d4ecff" opacity="0.7"/>
  <!-- eye -->
  <circle cx="23" cy="14.8" r="1.8" fill="#ffffff"/>
  <circle cx="23.4" cy="14.9" r="0.9" fill="#0a1f3a"/>
</svg>
