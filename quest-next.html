<!doctype html><html lang="en"><head><meta charset="utf8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Side Quest — builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap');
:root{
  --hi:#6a58a0; --lo:#241d3c; --frame:#3b3060; --bar:#5b4a96; --barhi:#8068c4; --bartx:#f5eeff;
  --outline:#140f24; --inset:#0f0a22; --gold:#ffd96b; --tx:#e3dbff; --card:#463a78; --cardtx:#f3eeff;
  --pixfont:'Silkscreen','Courier New',monospace; --pixfont2:'VT323','Courier New',monospace;
  --base:#191234; --base2:#322766; --dot:#2b2258; --env:#8068c4; --ban:rgba(128,104,196,.42);
  --comp:#5fe0c8; --compL:#6ff0d8; --compD:#3fb8a4; --chi:#7d6bc0; --clo:#281f48; --ctext:#f3eeff; --donetx:#0c3830;
}
*{box-sizing:border-box;}
html,body{margin:0;min-height:100%;background:#161029;font-family:var(--pixfont);color:var(--tx);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
#app{ position:relative; width:100%; max-width:460px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;
  background:radial-gradient(var(--dot) 1px,transparent 1.5px) 0 0/4px 4px, radial-gradient(circle at 50% 0%, var(--base2), var(--base));
  image-rendering:pixelated; }
#top{ flex:none; display:flex; align-items:center; gap:9px; padding:calc(11px + env(safe-area-inset-top)) 14px 10px; background:linear-gradient(180deg,#332a59,#241d3c); border-bottom:2px solid var(--outline); box-shadow:0 3px 0 rgba(0,0,0,.3); position:sticky; top:0; z-index:9; }
#top .t{ font-family:var(--pixfont); font-size:13px; color:var(--gold); letter-spacing:1px; text-transform:uppercase; text-shadow:0 0 9px rgba(255,200,110,.4); }
#top .sub{ font-family:var(--pixfont2); font-size:14px; color:var(--tx); opacity:.6; }
#tabs{ margin-left:auto; display:flex; gap:6px; }
#tabs button{ font-family:var(--pixfont); font-size:9px; letter-spacing:.5px; text-transform:lowercase; padding:6px 10px; cursor:pointer;
  background:var(--card); color:var(--cardtx); border:2px solid; border-color:var(--chi) var(--clo) var(--clo) var(--chi); }
#tabs button.on{ background:var(--bar); color:var(--bartx); }
.wrap{ flex:1; padding:14px; }
.view{ display:none; } .view.on{ display:block; }

/* ---------- BUILDER ---------- */
.qname-row{ display:flex; align-items:center; gap:8px; margin:0 0 14px; }
.qname-row label{ font-family:var(--pixfont); font-size:9px; letter-spacing:.5px; text-transform:uppercase; color:var(--tx); opacity:.6; flex:none; }
input.txt,textarea.txt{ font-family:var(--pixfont2); font-size:17px; color:var(--cardtx); background:var(--inset); border:2px solid; border-color:var(--lo) var(--hi) var(--hi) var(--lo); padding:7px 9px; width:100%; }
input.txt::placeholder,textarea.txt::placeholder{ color:var(--tx); opacity:.4; }
input.txt:focus,textarea.txt:focus{ outline:none; border-color:var(--gold); }
.qname-row input.txt{ font-family:var(--pixfont); font-size:13px; letter-spacing:.5px; color:var(--gold); text-transform:uppercase; }

.chapter{ margin:0 0 12px; background:linear-gradient(180deg,#2f2758,#271f48); border:2px solid; border-color:var(--chi) var(--clo) var(--clo) var(--chi); }
.chapter.dragging,.step.dragging{ opacity:.92; box-shadow:0 10px 24px rgba(0,0,0,.5); }
.chapter-hd{ display:flex; align-items:center; gap:7px; padding:9px 10px; background:linear-gradient(90deg,var(--ban),transparent); border-left:4px solid var(--gold); }
.chapter-hd input.txt{ background:transparent; border:none; font-family:var(--pixfont); font-size:12px; letter-spacing:1px; color:#ffd98a; text-transform:uppercase; padding:2px 0; }
.chapter-hd input.txt:focus{ border-bottom:2px solid var(--gold); }
.grip{ flex:none; width:22px; align-self:stretch; display:grid; place-items:center; cursor:grab; color:var(--tx); opacity:.55; font-size:15px; touch-action:none; user-select:none; }
.grip:active{ cursor:grabbing; }
.mini{ flex:none; width:24px; height:24px; display:grid; place-items:center; cursor:pointer; font-family:var(--pixfont); font-size:11px;
  background:var(--card); color:var(--cardtx); border:2px solid; border-color:var(--chi) var(--clo) var(--clo) var(--chi); }
.mini:active{ border-color:var(--clo) var(--chi) var(--chi) var(--clo); } .mini.del{ color:#ff9ab0; }
.chapter-body{ padding:9px 10px 10px; }
.steps{ display:flex; flex-direction:column; gap:7px; min-height:14px; }
.ph{ border:2px dashed var(--comp); background:rgba(95,224,200,.08); }

.step{ display:flex; align-items:stretch; gap:7px; background:var(--card); border:2px solid; border-color:var(--chi) var(--clo) var(--clo) var(--chi); padding:8px 9px; }
.step .play{ flex:none; width:26px; height:26px; display:grid; place-items:center; cursor:pointer; margin-top:1px; }
.step .play svg{ display:block; }
.step .mid{ flex:1; min-width:0; display:flex; flex-direction:column; gap:6px; }
.step .row2{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.diffchip{ font-family:var(--pixfont); font-size:9px; letter-spacing:.5px; padding:5px 9px; cursor:pointer; text-transform:lowercase; border:2px solid; white-space:nowrap; }
.diffchip.easy{ background:#26543f; color:#8fe8b4; border-color:#4a8f7d #10352b #10352b #4a8f7d; }
.diffchip.med{ background:#3a3466; color:#c3b4ff; border-color:#6a58a0 #241d3c #241d3c #6a58a0; }
.diffchip.hard{ background:#5a2f3a; color:#ff9eb4; border-color:#a85f6e #301820 #301820 #a85f6e; }
.step .sxp{ font-family:var(--pixfont2); font-size:16px; color:#ffcf6e; flex:none; }
.step .date{ font-family:var(--pixfont2); font-size:15px; color:var(--comp); background:var(--inset); border:2px solid; border-color:var(--lo) var(--hi) var(--hi) var(--lo); padding:4px 7px; width:96px; margin-left:auto; }
.step .date::placeholder{ color:var(--comp); opacity:.5; }
textarea.notes{ resize:none; overflow:hidden; min-height:34px; line-height:1.25; font-size:15px; }
.step .del{ flex:none; align-self:flex-start; }

.addbtn{ font-family:var(--pixfont); font-size:10px; letter-spacing:.5px; text-transform:lowercase; padding:9px; cursor:pointer; width:100%; margin-top:9px;
  background:repeating-linear-gradient(45deg,#2a2248 0 7px,#241d40 7px 14px); border:2px dashed #6a58a0; color:#b7a6ef; }
.addbtn.chap{ margin-top:2px; }
.bigrow{ display:flex; gap:9px; margin-top:14px; }
.bigbtn{ flex:1; font-family:var(--pixfont); font-size:11px; letter-spacing:.5px; text-transform:lowercase; padding:12px; cursor:pointer;
  background:var(--bar); color:var(--bartx); border:2px solid; border-color:var(--hi) var(--lo) var(--lo) var(--hi); }
.bigbtn.ghost{ background:var(--card); color:var(--cardtx); }
.bigbtn.danger{ background:#5a2f3a; color:#ff9eb4; border-color:#a85f6e #301820 #301820 #a85f6e; }
.bigbtn:active{ border-color:var(--lo) var(--hi) var(--hi) var(--lo); }
.savenote{ font-family:var(--pixfont2); font-size:15px; color:var(--comp); text-align:center; margin-top:10px; min-height:18px; }

/* ---------- PREVIEW ---------- */
.qhd{ display:flex; align-items:baseline; gap:8px; margin:0 2px 12px; }
.qhd .qt{ font-family:var(--pixfont); font-size:14px; color:var(--gold); letter-spacing:1px; text-transform:uppercase; text-shadow:0 0 9px rgba(255,200,110,.45); }
.qhd .qm{ font-family:var(--pixfont2); font-size:15px; color:var(--tx); opacity:.65; margin-left:auto; }
.pv-ban{ position:relative; display:flex; align-items:center; gap:9px; margin:2px 0 8px; padding:8px 12px; background:linear-gradient(90deg,var(--ban),transparent); border-left:4px solid var(--gold); }
.pv-ban.mt{ margin-top:16px; } .pv-ban .lbl{ font-family:var(--pixfont); font-size:12px; color:#ffd98a; letter-spacing:1.5px; text-transform:uppercase; text-shadow:0 0 8px rgba(255,200,110,.4); }
.pv-ban .cnt{ margin-left:auto; font-family:var(--pixfont2); font-size:14px; color:var(--tx); opacity:.7; } .pv-ban .cnt b{ color:#ffcf6e; }
.pv-track{ height:11px; margin:0 2px 8px; background:var(--inset); border:2px solid; border-color:var(--lo) var(--hi) var(--hi) var(--lo); overflow:hidden; }
.pv-fill{ height:100%; background:repeating-linear-gradient(45deg,var(--compL) 0 6px,var(--compD) 6px 12px); box-shadow:0 0 9px var(--comp); transition:width .3s; }
.pv-rows{ display:flex; flex-direction:column; gap:7px; }
.pv-row{ display:flex; align-items:flex-start; gap:11px; background:var(--card); border:2px solid; border-color:var(--chi) var(--clo) var(--clo) var(--chi); padding:9px 11px; cursor:pointer; }
.pv-row .ic{ flex:none; width:26px; height:26px; display:grid; place-items:center; margin-top:1px; } .pv-row .ic svg{ display:block; }
.pv-row .bd{ flex:1; min-width:0; }
.pv-row .task{ display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:var(--pixfont2); font-size:17px; color:var(--ctext); line-height:1.15; }
.pv-row .meta{ display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; font-family:var(--pixfont2); font-size:13px; color:var(--ctext); opacity:.8; margin-top:2px; line-height:1.3; } .pv-row .meta .date{ color:var(--comp); }
.pv-row .xp{ flex:none; font-family:var(--pixfont2); font-size:16px; color:#ffcf6e; margin-top:2px; }
.pv-row.done{ background:linear-gradient(180deg,var(--comp),var(--compD)); border-color:var(--compL) var(--compD) var(--compD) var(--compL); box-shadow:0 0 12px -2px var(--comp); }
.pv-row.done .task{ color:var(--donetx); } .pv-row.done .meta{ color:var(--donetx); } .pv-row.done .meta .date{ color:var(--donetx); }
.pv-row.done .xp{ color:#ffe27a; text-shadow:0 0 6px rgba(255,217,107,.95); }
.pv-empty{ font-family:var(--pixfont2); font-size:16px; color:var(--tx); opacity:.5; text-align:center; padding:40px 10px; }
.pv-foot{ font-family:var(--pixfont2); font-size:15px; color:var(--tx); opacity:.75; text-align:center; margin-top:16px; } .pv-foot b{ color:#ffcf6e; } .pv-foot i{ color:var(--comp); font-style:normal; }
.pv-hint{ font-family:var(--pixfont2); font-size:13px; color:var(--tx); opacity:.45; text-align:center; margin-top:6px; }

/* modals */
.modal{ position:fixed; inset:0; z-index:40; display:none; align-items:center; justify-content:center; padding:22px; background:rgba(6,9,16,.74); }
.modal.on{ display:flex; }
.mcard{ width:100%; max-width:360px; background:var(--frame); border:3px solid; border-color:var(--hi) var(--lo) var(--lo) var(--hi); box-shadow:0 0 0 2px var(--outline),0 16px 44px rgba(0,0,0,.55); padding:15px; }
.mcard h3{ font-family:var(--pixfont); font-size:12px; letter-spacing:.5px; color:var(--gold); margin:0 0 8px; text-transform:lowercase; }
.dtask{ font-family:var(--pixfont2); font-size:19px; color:var(--cardtx); line-height:1.18; }
.dmeta{ font-family:var(--pixfont2); font-size:14px; color:var(--cardtx); opacity:.7; margin:5px 0 10px; } .dmeta .date{ color:var(--comp); } .dmeta .xp{ color:#ffcf6e; }
.dnotes{ font-family:var(--pixfont2); font-size:16px; color:var(--cardtx); opacity:.9; line-height:1.4; background:var(--inset); border:2px solid; border-color:var(--lo) var(--hi) var(--hi) var(--lo); padding:9px 10px; white-space:pre-wrap; min-height:20px; }
.dnotes.empty{ opacity:.4; }
.mrow{ display:flex; gap:9px; margin-top:14px; }
.msg{ font-family:var(--pixfont2); font-size:15px; color:var(--cardtx); opacity:.85; margin:0 0 6px; line-height:1.35; } .msg b{ color:var(--comp); }
</style></head>
<body><div id="app">
  <header id="top">
    <span class="t">✦ side quest</span><span class="sub">builder</span>
    <div id="tabs"><button id="tabBuild" class="on">build</button><button id="tabPreview">preview</button></div>
  </header>
  <div class="wrap">
    <div class="view on" id="viewBuild">
      <div class="qname-row"><label>quest</label><input class="txt" id="qname" placeholder="name your quest…" maxlength="80"></div>
      <div id="chapters"></div>
      <button class="addbtn chap" id="addChapter">＋ add chapter</button>
      <div class="bigrow"><button class="bigbtn ghost" id="clearBtn">clear</button><button class="bigbtn" id="saveBtn">save quest</button></div>
      <div class="bigrow"><button class="bigbtn danger" id="giveupBtn">give up quest</button></div>
      <div class="savenote" id="saveNote"></div>
    </div>
    <div class="view" id="viewPreview"></div>
  </div>

  <div class="modal" id="detail"><div class="mcard">
    <h3>▸ task details</h3>
    <div class="dtask" id="dTask"></div>
    <div class="dmeta" id="dMeta"></div>
    <div class="dnotes" id="dNotes"></div>
    <div class="mrow"><button class="bigbtn ghost" id="dClose">close</button><button class="bigbtn" id="dEdit">edit</button></div>
  </div></div>

  <div class="modal" id="confirm"><div class="mcard">
    <h3 id="cfTitle">are you sure?</h3>
    <p class="msg" id="cfMsg"></p>
    <div class="mrow"><button class="bigbtn ghost" id="cfNo">cancel</button><button class="bigbtn danger" id="cfYes">confirm</button></div>
  </div></div>
</div>
<script>
// ===== Side Quest — builder prototype =====
const XP={easy:5,med:10,hard:20}, DIFFS=['easy','med','hard'];
const CW_PLAY='M8 5v14l11-7z', CW_STAR='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.62L12 2 9.81 8.62 2 9.24l5.46 4.73L5.82 21z';
let uid=0; const nid=(p)=>p+'_'+(Date.now().toString(36))+'_'+(uid++);

function blankStep(){ return {id:nid('s'), text:'', diff:'med', date:'', notes:'', done:false}; }
function blankChapter(){ return {id:nid('c'), name:'', steps:[blankStep()]}; }
function blankQuest(){ return {id:nid('q'), name:'', chapters:[blankChapter()], createdAt:null, state:'active'}; }
let quest = load() || blankQuest();

const stepXP=(s)=>XP[s.diff]||0;
function questTotals(q){ let xp=0,exp=0,done=0,tot=0; q.chapters.forEach(c=>c.steps.forEach(s=>{ tot++; xp+=stepXP(s); if(s.done){done++; exp+=stepXP(s);} })); return {xpEarned:exp,xpTotal:xp,stepsDone:done,steps:tot}; }
function esc(x){ return String(x==null?'':x).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

// ---- persistence ----
function persist(){ try{ localStorage.setItem('aq_builder_draft', JSON.stringify(quest)); }catch(e){} }
function load(){ try{ const d=JSON.parse(localStorage.getItem('aq_builder_draft')); return (d&&d.chapters)?d:null; }catch(e){ return null; } }
function saveQuest(){
  quest.createdAt = quest.createdAt || 'now';
  let W; try{ W=JSON.parse(localStorage.getItem('aq_worlds'))||null; }catch(e){ W=null; }
  if(!W || !W.worlds) W={ worlds:[{id:nid('w'), name:'My Quests', emoji:'✦', color:'twilight', questIds:[]}], activeWorldId:null, quests:{} };
  W.activeWorldId = W.activeWorldId || W.worlds[0].id; W.quests = W.quests || {};
  W.quests[quest.id] = JSON.parse(JSON.stringify(quest));
  const w = W.worlds.find(x=>x.id===W.activeWorldId) || W.worlds[0];
  w.questIds = w.questIds || []; if(!w.questIds.includes(quest.id)) w.questIds.push(quest.id);
  localStorage.setItem('aq_worlds', JSON.stringify(W));
}

// ---- builder render ----
const chaptersEl=document.getElementById('chapters');
function playSVG(done){ return '<svg viewBox="0 0 24 24" width="24" height="24" style="filter:drop-shadow(0 0 4px '+(done?'rgba(255,222,120,.95)':'rgba(190,160,255,.9)')+')"><path d="'+(done?CW_STAR:CW_PLAY)+'" fill="'+(done?'#ffe27a':'#d7c8ff')+'"/></svg>'; }
function autoGrow(t){ t.style.height='auto'; t.style.height=(t.scrollHeight+2)+'px'; }
function renderBuilder(){
  document.getElementById('qname').value = quest.name;
  chaptersEl.innerHTML='';
  quest.chapters.forEach((c,ci)=>{
    const ch=document.createElement('div'); ch.className='chapter'; ch.dataset.ci=ci;
    const hd=document.createElement('div'); hd.className='chapter-hd';
    hd.innerHTML='<div class="grip" data-drag="chapter">⠿</div><input class="txt" placeholder="chapter name…" maxlength="50">'+
      '<div class="mini del" data-act="cdel" title="delete chapter">✕</div>';
    hd.querySelector('input').value=c.name;
    hd.querySelector('input').addEventListener('input',e=>{ c.name=e.target.value; onEdit(); });
    hd.querySelector('.grip').addEventListener('pointerdown',e=>beginDrag(e,'chapter',ch,ci));
    hd.querySelector('.mini').onclick=()=>{ if(quest.chapters.length>1) quest.chapters.splice(ci,1); renderBuilder(); onEdit(); };
    ch.appendChild(hd);
    const body=document.createElement('div'); body.className='chapter-body';
    const stepsEl=document.createElement('div'); stepsEl.className='steps'; stepsEl.dataset.ci=ci;
    c.steps.forEach((s,si)=>stepsEl.appendChild(renderStep(c,ci,s,si)));
    body.appendChild(stepsEl);
    const add=document.createElement('button'); add.className='addbtn'; add.textContent='＋ add step';
    add.onclick=()=>{ c.steps.push(blankStep()); renderBuilder(); onEdit(); };
    body.appendChild(add); ch.appendChild(body); chaptersEl.appendChild(ch);
  });
  chaptersEl.querySelectorAll('textarea.notes').forEach(autoGrow);
}
function renderStep(c,ci,s,si){
  const el=document.createElement('div'); el.className='step'; el.dataset.ci=ci; el.dataset.si=si;
  el.innerHTML=
    '<div class="grip" data-drag="step">⠿</div>'+
    '<div class="play" title="toggle done">'+playSVG(s.done)+'</div>'+
    '<div class="mid">'+
      '<input class="txt tk" placeholder="step / task…" maxlength="200">'+
      '<div class="row2"><div class="diffchip '+s.diff+'" title="difficulty">'+s.diff+'</div><span class="sxp">+'+stepXP(s)+'</span>'+
        '<input class="date" placeholder="date (opt)" maxlength="10"></div>'+
      '<textarea class="txt notes" placeholder="notes (optional)…" maxlength="1000" rows="1"></textarea>'+
    '</div>'+
    '<div class="mini del" data-act="sdel" title="remove step">✕</div>';
  el.querySelector('.tk').value=s.text; el.querySelector('.date').value=s.date; el.querySelector('.notes').value=s.notes;
  el.querySelector('.tk').addEventListener('input',e=>{ s.text=e.target.value; onEdit(); });
  el.querySelector('.date').addEventListener('input',e=>{ s.date=e.target.value; onEdit(); });
  const ta=el.querySelector('.notes'); ta.addEventListener('input',e=>{ s.notes=e.target.value; autoGrow(ta); onEdit(); });
  el.querySelector('.play').onclick=()=>{ s.done=!s.done; renderBuilder(); onEdit(); };
  el.querySelector('.diffchip').onclick=()=>{ s.diff=DIFFS[(DIFFS.indexOf(s.diff)+1)%3]; renderBuilder(); onEdit(); };
  el.querySelector('.grip').addEventListener('pointerdown',e=>beginDrag(e,'step',el,{ci,si}));
  el.querySelector('.del').onclick=()=>{ if(c.steps.length>1) c.steps.splice(si,1); else c.steps.splice(si,1,blankStep()); renderBuilder(); onEdit(); };
  return el;
}
function onEdit(){ persist(); if(document.getElementById('viewPreview').classList.contains('on')) renderPreview(); }

// ---- drag to reorder (steps within/across chapters, and chapters) ----
let drag=null;
function beginDrag(e, kind, el, ref){
  e.preventDefault();
  const r=el.getBoundingClientRect();
  const ph=document.createElement('div'); ph.className='ph'; ph.style.height=r.height+'px';
  el.parentNode.replaceChild(ph, el);
  document.body.appendChild(el); el.classList.add('dragging');
  el.style.position='fixed'; el.style.width=r.width+'px'; el.style.left=r.left+'px'; el.style.top=r.top+'px'; el.style.pointerEvents='none'; el.style.zIndex=999; el.style.margin=0;
  drag={kind,el,ph,ref,offX:e.clientX-r.left,offY:e.clientY-r.top};
  window.addEventListener('pointermove', dragMove); window.addEventListener('pointerup', dragEnd, {once:true});
}
function dragMove(e){
  if(!drag)return;
  drag.el.style.left=(e.clientX-drag.offX)+'px'; drag.el.style.top=(e.clientY-drag.offY)+'px';
  const under=document.elementFromPoint(e.clientX, e.clientY); if(!under)return;
  if(drag.kind==='step'){
    const overSteps=under.closest('.steps'); if(!overSteps)return;
    const overStep=under.closest('.step');
    if(overStep && overStep!==drag.ph){ const rr=overStep.getBoundingClientRect(); overSteps.insertBefore(drag.ph, (e.clientY<rr.top+rr.height/2)?overStep:overStep.nextSibling); }
    else if(!overStep && !overSteps.contains(drag.ph)){ overSteps.appendChild(drag.ph); }
  } else {
    const overChap=under.closest('.chapter'); if(!overChap || overChap===drag.ph)return;
    const rr=overChap.getBoundingClientRect(); chaptersEl.insertBefore(drag.ph, (e.clientY<rr.top+rr.height/2)?overChap:overChap.nextSibling);
  }
}
function dragEnd(){
  window.removeEventListener('pointermove', dragMove); if(!drag)return;
  if(drag.kind==='step'){
    const {ci,si}=drag.ref; const step=quest.chapters[ci].steps[si];
    const targetStepsEl=drag.ph.parentNode; const targetCi=+targetStepsEl.dataset.ci;
    let idx=0; for(const ch of targetStepsEl.children){ if(ch===drag.ph)break; if(ch.classList.contains('step'))idx++; }
    quest.chapters[ci].steps.splice(si,1);
    quest.chapters[targetCi].steps.splice(idx,0,step);
  } else {
    const {ci}=drag.ref==null?{}:{ci:+drag.el.dataset.ci}; const from=+drag.el.dataset.ci; const chap=quest.chapters[from];
    let idx=0; for(const ch of chaptersEl.children){ if(ch===drag.ph)break; if(ch.classList.contains('chapter'))idx++; }
    quest.chapters.splice(from,1); quest.chapters.splice(idx,0,chap);
  }
  drag.el.remove(); drag.ph.remove(); drag=null; renderBuilder(); onEdit();
}

// ---- preview render ----
const pv=document.getElementById('viewPreview');
function renderPreview(){
  const t=questTotals(quest);
  const anySteps = quest.chapters.some(c=>c.steps.some(s=>s.text.trim()));
  let h='<div class="qhd"><span class="qt">'+esc(quest.name||'untitled quest')+'</span>'+
        '<span class="qm">'+t.xpEarned+' / '+t.xpTotal+' xp · '+t.stepsDone+'/'+t.steps+' done</span></div>';
  if(quest.state==='gaveup') h+='<div class="savenote" style="margin:0 0 10px">🏳️ given up — you keep what you earned, no bonus</div>';
  if(!anySteps){ h+='<div class="pv-empty">add a chapter + some steps to see your quest take shape ✦</div>'; pv.innerHTML=h; return; }
  quest.chapters.forEach((c,ci)=>{
    let cx=0,cd=0,ce=0,ct=0; c.steps.forEach(s=>{ ct++; cx+=stepXP(s); if(s.done){cd++; ce+=stepXP(s);} });
    h+='<div class="pv-ban'+(ci>0?' mt':'')+'"><span class="lbl">'+esc(c.name||('chapter '+(ci+1)))+'</span><span class="cnt"><b>'+cd+'</b>/'+ct+' done</span></div>';
    h+='<div class="pv-track"><div class="pv-fill" style="width:'+(cx?Math.round(ce/cx*100):0)+'%"></div></div><div class="pv-rows">';
    c.steps.forEach((s,si)=>{
      const meta=[s.date?('<span class="date">'+esc(s.date)+'</span>'):'', esc(s.notes)].filter(Boolean).join(' · ');
      h+='<div class="pv-row'+(s.done?' done':'')+'" data-ci="'+ci+'" data-si="'+si+'"><span class="ic">'+playSVG(s.done)+'</span>'+
         '<span class="bd"><span class="task">'+esc(s.text||'(untitled step)')+'</span>'+(meta?'<span class="meta">'+meta+'</span>':'')+'</span>'+
         '<span class="xp">+'+stepXP(s)+'</span></div>';
    });
    h+='</div>';
  });
  h+='<div class="pv-foot">on finish: <i>'+quest.chapters.length+' + 3</i> ⭐ · earning <b>'+t.xpTotal+'</b> coins + xp as you go</div>';
  h+='<div class="pv-hint">tap a step to complete it · right-click / hold for details</div>';
  pv.innerHTML=h;
  pv.querySelectorAll('.pv-row').forEach(row=>{
    const ci=+row.dataset.ci, si=+row.dataset.si, s=quest.chapters[ci].steps[si];
    let held=false, timer=null;
    const openIt=()=>{ held=true; openDetail(s,ci); };
    row.addEventListener('contextmenu',e=>{ e.preventDefault(); clearTimeout(timer); openDetail(s,ci); });
    row.addEventListener('pointerdown',()=>{ held=false; timer=setTimeout(openIt,450); });
    row.addEventListener('pointermove',()=>{ clearTimeout(timer); });
    row.addEventListener('pointerup',()=>{ clearTimeout(timer); if(!held){ s.done=!s.done; if(document.getElementById('viewBuild').classList.contains('on'))renderBuilder(); persist(); renderPreview(); } });
  });
}

// ---- detail modal ----
const detail=document.getElementById('detail');
let detailStep=null;
function openDetail(s,ci){
  detailStep=s;
  document.getElementById('dTask').textContent = s.text||'(untitled step)';
  document.getElementById('dMeta').innerHTML = [s.date?'<span class="date">'+esc(s.date)+'</span>':'', '<span class="xp">+'+stepXP(s)+' xp</span>', s.diff].filter(Boolean).join(' · ');
  const dn=document.getElementById('dNotes'); dn.textContent = s.notes||'no notes'; dn.classList.toggle('empty', !s.notes);
  detail.classList.add('on');
}
document.getElementById('dClose').onclick=()=>detail.classList.remove('on');
document.getElementById('dEdit').onclick=()=>{ detail.classList.remove('on'); tB.click(); };
detail.addEventListener('click',e=>{ if(e.target===detail) detail.classList.remove('on'); });

// ---- confirm modal ----
const confirmM=document.getElementById('confirm'); let confirmCb=null;
function askConfirm(title,msg,cb){ document.getElementById('cfTitle').textContent=title; document.getElementById('cfMsg').innerHTML=msg; confirmCb=cb; confirmM.classList.add('on'); }
document.getElementById('cfNo').onclick=()=>confirmM.classList.remove('on');
document.getElementById('cfYes').onclick=()=>{ confirmM.classList.remove('on'); if(confirmCb)confirmCb(); };
confirmM.addEventListener('click',e=>{ if(e.target===confirmM) confirmM.classList.remove('on'); });

// ---- wiring ----
document.getElementById('qname').addEventListener('input',e=>{ quest.name=e.target.value; onEdit(); });
document.getElementById('addChapter').onclick=()=>{ quest.chapters.push(blankChapter()); renderBuilder(); onEdit(); };
document.getElementById('clearBtn').onclick=()=>askConfirm('clear this quest?','this wipes the current draft and starts fresh.',()=>{ quest=blankQuest(); renderBuilder(); persist(); document.getElementById('saveNote').textContent=''; });
document.getElementById('saveBtn').onclick=()=>{ saveQuest(); document.getElementById('saveNote').textContent='✓ saved to your world'; setTimeout(()=>{document.getElementById('saveNote').textContent='';},2600); };
document.getElementById('giveupBtn').onclick=()=>askConfirm('give up quest?', 'you’ll keep every coin + star you’ve already earned, but forfeit the <b>+3</b> completion bonus. the quest gets a faded flag (resumable later).', ()=>{ quest.state='gaveup'; persist(); document.getElementById('saveNote').textContent='🏳️ given up — resumable later'; setTimeout(()=>{document.getElementById('saveNote').textContent='';},2600); });
const vB=document.getElementById('viewBuild'), vP=document.getElementById('viewPreview'), tB=document.getElementById('tabBuild'), tP=document.getElementById('tabPreview');
tB.onclick=()=>{ vB.classList.add('on'); vP.classList.remove('on'); tB.classList.add('on'); tP.classList.remove('on'); renderBuilder(); };
tP.onclick=()=>{ renderPreview(); vP.classList.add('on'); vB.classList.remove('on'); tP.classList.add('on'); tB.classList.remove('on'); };

renderBuilder();
</script>
</body></html>
